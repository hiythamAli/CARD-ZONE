<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>كارد زون — بطاقات رقمية</title>

  <!-- خط جوجل العربي -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@700;800;900&display=swap"
    rel="stylesheet" />

  <!-- ملف الستايل -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- ============================================================
       TOP BAR العلوي
       ============================================================ -->
  <div class="topbar">
    <div class="container topbar-in">
      <div class="topbar-links">
        <a href="#">عن كارد زون</a>
        <a href="https://web.whatsapp.com/">تواصل معنا</a>
        <a href="#">المدونة</a>
      </div>
      <div class="topbar-social">
        <a href="https://web.whatsapp.com/" target="_blank" title="واتساب"><img src="icons/social.png" alt=""></a>
        <a href="t.me/hitham_5" target="_blank" title="تليجرام"><img src="icons/telegram.png" alt=""></a>
        <a href="https://x.com/Hiytham_Ali" title="تويتر"     style="background-color: #dae9fd;"><img src="icons/twitter.png" alt=""></a >
        <a href="https://www.instagram.com/azraq.media1?igsh=dGRwaTgxYWNmaDhz" title="إنستقرام"><img src="icons/instagram.png" alt=""></a>
      </div>
    </div>
  </div>

  <!-- ============================================================
       NAVBAR شريط التنقل
       ============================================================ -->
  <nav class="navbar">
    <div class="container nav-in">

      <!-- الشعار -->
      <a href="#/" class="logo" onclick="navigateTo('home')">
        <div class="logo-ico">C</div>
        <span class="logo-txt">كارد <span>زون</span></span>
      </a>

      <!-- البحث -->
      <div class="searchbar">
        <input type="text" id="searchInput" placeholder="ابحث عن لعبة، اشتراك، باقة..." autocomplete="off" />
        <button class="search-ico-btn" onclick="toggleSearch()">🔍</button>
      </div>

      <!-- أزرار الحساب والسلة -->
      <div class="nav-actions">
        <button class="btn btn-outline" onclick="showToast('سيتم إضافة تسجيل الدخول قريباً','info')">تسجيل
          الدخول</button>
        <button class="btn btn-gold" onclick="showToast('سيتم إضافة إنشاء الحساب قريباً','info')">إنشاء حساب ⭐</button>
        <button class="cart-btn" id="cartBtn" onclick="toggleCartDrawer()">
          🛒
          <span class="cart-badge hidden" id="cartBadge">0</span>
        </button>
      </div>

    </div>
  </nav>

  <!-- ============================================================
       CATEGORY NAV شريط التصنيفات
       ============================================================ -->
  <div class="catnav">
    <div class="container catnav-in">
      <button class="catnav-item" data-cat="home" onclick="navigateTo('home')"> <span class="ci"></span>
        الرئيسية</button>
      <button class="catnav-item" data-cat="games" onclick="navigateTo('cat','games')"> <span class="ci"></span> شحن
        الألعاب</button>
      <button class="catnav-item" data-cat="subscriptions" onclick="navigateTo('cat','subscriptions')"><span
          class="ci"></span> اشتراكات</button>
      <button class="catnav-item" data-cat="social" onclick="navigateTo('cat','social')"> <span class="ci"></span> شبكات
        التواصل</button>
      <button class="catnav-item" data-cat="software" onclick="navigateTo('cat','software')"><span class="ci"></span>
        مكتبيات وأعمال</button>
      <button class="catnav-item" data-cat="telecom" onclick="navigateTo('cat','telecom')"> <span class="ci"></span>
        الاتصالات</button>
    </div>
  </div>

  <!-- ============================================================
       MAIN CONTENT — هنا يتم حقن الصفحات ديناميكياً
       ============================================================ -->
  <main id="app"></main>

  <!-- ============================================================
       CART DRAWER درج السلة
       ============================================================ -->
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCartDrawer()"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div class="drawer-hdr">
      <div class="drawer-title">🛒 <span id="drawerTitle">السلة</span></div>
      <button class="drawer-close" onclick="toggleCartDrawer()">✕</button>
    </div>
    <div class="drawer-items" id="drawerItems">
      <!-- تتعبأ بالجافاسكريبت -->
    </div>
    <div class="drawer-foot" id="drawerFoot" style="display:none">
      <div class="sum-row"><span>المجموع</span><span id="drawerTotal">0</span> ريال</div>
      <div class="sum-row"><span>الشحن</span><span style="color:#00c864">مجاني</span></div>
      <button class="checkout-btn" onclick="navigateTo('cart'); toggleCartDrawer()">إتمام الطلب ◄</button>
    </div>
  </div>

  <!-- ============================================================
       SEARCH OVERLAY نافذة البحث
       ============================================================ -->
  <div class="search-ov" id="searchOv" onclick="closeSearch(event)">
    <div class="search-wrap">
      <input class="search-big" id="searchBig" type="text" placeholder="ابحث عن أي منتج..."
        oninput="doSearch(this.value)" />
      <button class="search-x" onclick="toggleSearch()">✕</button>
    </div>
    <div class="search-res" id="searchRes"></div>
  </div>

  <!-- ============================================================
       TOAST NOTIFICATIONS
       ============================================================ -->
  <div class="toast-wrap" id="toastWrap"></div>

  <!-- ============================================================
       زر الواتساب العائم
       ============================================================ -->
  <a href="https://web.whatsapp.com/" target="_blank" class="chat-float" title="تواصل معنا على واتساب"></a>

  <!-- ============================================================
       ملفات الجافاسكريبت — الترتيب مهم جداً
       ============================================================ -->
  <script src="js/data.js"></script> <!-- البيانات أولاً -->
  <script src="js/app.js"></script> <!-- المنطق ثانياً -->

</body>

</html>
